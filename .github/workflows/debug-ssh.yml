name: Debug SSH connectivity

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
    steps:
      - name: Show runner info
        run: |
          uname -a
          cat /etc/os-release || true

      - name: DNS lookup and host resolution
        run: |
          echo "SSH_HOST=${SSH_HOST}"
          sudo apt-get update -y >/dev/null
          sudo apt-get install -y dnsutils netcat-traditional || true
          nslookup "$SSH_HOST" || true
          getent hosts "$SSH_HOST" || true

      - name: Port connect test
        run: |
          printf "Testing TCP connect to %s:%s\n" "$SSH_HOST" "$SSH_PORT"
          nc -vz "$SSH_HOST" "$SSH_PORT" || true

      - name: Python socket test
        run: |
          python - <<'PY'
          import socket, os
          host = os.environ.get('SSH_HOST')
          port = int(os.environ.get('SSH_PORT', '22'))
          try:
              print('resolve:', socket.gethostbyname_ex(host)[2])
          except Exception as e:
              print('resolve failed:', e)
          try:
              s=socket.socket(); s.settimeout(10); s.connect((host,port)); s.close(); print('connect ok')
          except Exception as e:
              print('connect failed:', e)
          PY
