name: Backend CI

on:
  push:
    branches: [ main, 'feature/backend', 'backend/*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then python -m pip install -r backend/requirements.txt; fi

      - name: Run tests (if any)
        run: |
          if [ -f backend/pytest.ini ] || [ -d backend/tests ]; then cd backend && pytest -q; else echo 'No backend tests found, skipping'; fi

      - name: Lint (optional)
        run: |
          if command -v flake8 >/dev/null 2>&1; then flake8 backend || true; else echo 'flake8 not installed, skipping'; fi

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ci_cd-backend:${{ github.sha }} backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ci_cd-backend:${{ github.sha }}
