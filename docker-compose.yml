version: "3.8"

# Compose file for running the frontend and backend images pushed to Docker Hub.
# It expects `DOCKERHUB_USERNAME` to be provided in the environment or in a `.env` file.
# Example `.env` content: DOCKERHUB_USERNAME=yourdockerhubuser

services:
  backend:
    image: "${DOCKERHUB_USERNAME:-poojithaarelli}/ci_cd-backend:latest"
    restart: unless-stopped
    environment:
      - PORT=8000
    ports:
      - "8000:8000"
    networks:
      - web

  frontend:
    image: "${DOCKERHUB_USERNAME:-poojithaarelli}/ci_cd-frontend:latest"
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - web

networks:
  web:
    driver: bridge
